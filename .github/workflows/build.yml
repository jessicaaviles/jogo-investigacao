name: Build and Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Build Backend
        run: |
          cd backend
          npm ci
          npm run build
      - name: Run Backend Tests
        run: |
          cd backend
          npm test
